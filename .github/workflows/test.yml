name: Unit Test
run-name: Test
on: [push]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        python-version: "3.10"
    - run: uv sync
    - name: Lint with ruff
      run: uvx ruff check .
    - name: Type check with Ty
      run: uvx ty check .
    - name: Test with pytest
      run: uvx pytest tests
